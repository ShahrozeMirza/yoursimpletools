name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Hostinger to known hosts
        run: |
          ssh-keyscan -p 65002 145.79.25.59 >> ~/.ssh/known_hosts

      - name: Deploy via Rsync
        run: |
          rsync -avz --delete \
          -e "ssh -p 65002" \
          ./ \
          u728134842@145.79.25.59:/home/u728134842/public_html/ \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='*.md' \
          --exclude='.gitignore'